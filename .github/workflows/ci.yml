# Continuous Integration — the single biggest upgrade to your GitHub workflow.
#
# Every push and every pull request, GitHub spins up a fresh machine, installs
# your project, and runs your linter + tests. You get a green check or a red X
# directly on the PR. No more "works on my machine."

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]  # test on multiple versions

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package + dev tools
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        run: pytest
